# ============================================================================
#  CHANAKYA — Local infrastructure
#  Brings up the four datastores the platform depends on:
#    - PostgreSQL  : relational store (events, missions, timeline, indices)
#    - Redis       : cache + pub/sub for the live intelligence stream
#    - Neo4j       : knowledge graph (supplier <-> route <-> refinery <-> risk)
#    - Qdrant      : vector store for RAG over geopolitical/commodity corpus
#
#  Usage:  docker compose up -d
#  Stop :  docker compose down          (add -v to wipe volumes)
# ============================================================================
name: chanakya

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: chanakya-backend
    restart: unless-stopped
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8010
      PROCESS_ROLE: all
      FRONTEND_ORIGIN: http://localhost:3100
      DATABASE_URL: postgresql+asyncpg://chanakya:chanakya_dev_pw@postgres:5432/chanakya
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: chanakya_dev_pw
      QDRANT_URL: http://qdrant:6333
      # Local dev PIN. For any hosted deployment set a strong OPERATOR_PIN in the
      # environment (>=8 chars, not a placeholder) — /readyz blocks production
      # readiness until it is. See .env.production.example.
      OPERATOR_PIN: ${OPERATOR_PIN:-dev-local-pin}
    ports:
      - "8010:8010"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8010
        NEXT_PUBLIC_WS_BASE_URL: ws://localhost:8010
    container_name: chanakya-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8010
      NEXT_PUBLIC_WS_BASE_URL: ws://localhost:8010
    ports:
      - "3100:3100"
    depends_on:
      backend:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: chanakya-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chanakya}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chanakya_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-chanakya}
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chanakya}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chanakya-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: chanakya-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-chanakya_dev_pw}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: chanakya-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  qdrant_data:
